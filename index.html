<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الشيخ محمد صديق المنشاوي - الختمة المرتلة الثانية</title>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6JJ4WGLT89"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-6JJ4WGLT89');
    </script>

    <!-- استدعاء خط القاهرة -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* درجات ألوان ملكية هادئة ورقيقة */
            --bg-dark: #020d0a;
            --bg-mid: #031813;
            --bg-light: #06241c;
            --accent-gold: #d4af37; /* ذهبي مطفي كلاسيكي فاخر */
            --accent-hover: #e5c158;
            --text-main: #f1f5f9;
            --text-muted: #8ba29d; /* رمادي مائل للزمردي ناعم للغاية */
            --glass-bg: rgba(255, 255, 255, 0.015);
            --glass-border: rgba(255, 255, 255, 0.03);
            --glass-active: rgba(212, 175, 55, 0.04);
            --danger: #f43f5e;
            --success: #10b981;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent;
        }

        /* تخصيص شريط التمرير بنحافة تامة */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-gold); }

        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at top, var(--bg-mid), var(--bg-dark)) fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding-bottom: 130px; /* زيادة بسيطة للهامش لتناسب أبعاد المشغل الجديد */
            
            /* منع تحديد أو تظليل أو تعليم النصوص تماماً عند الضغط للنسخ */
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .container {
            width: 100%;
            max-width: 660px; /* مدمج ومريح للعين */
            padding: 15px 16px 25px 16px; 
            display: flex;
            flex-direction: column;
            gap: 12px; /* مسافات تماسك واحترافية */
        }

        /* الترويسة الرئيسية */
        header {
            text-align: center;
            padding: 20px 10px 10px 10px; /* زيادة المساحة من الأعلى لتعطي توازناً بصرياً */
            user-select: none;
        }
        
        .header-image-container {
            display: flex;
            justify-content: center;
            margin-bottom: 12px; /* زيادة طفيفة للهامش لمنع ملامسة النص */
        }

        /* تنسيق الصورة المحدث بزيادة طفيفة في الارتفاع من الأسفل مع الحفاظ على الضغط */
        .header-img {
            height: 110px; /* زيادة الارتفاع قليلاً جداً من الأسفل */
            width: 135px; /* الحفاظ على العرض المضغوط */
            object-fit: cover; 
            object-position: center 20%; /* تعديل طفيف للموقع ليكون متناسقاً بين الرأس والجسد */
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease;
        }
        
        .header-img:hover {
            transform: scale(1.03);
        }

        header h1 { 
            font-size: 1.35rem;
            font-weight: 300;
            letter-spacing: 0.3px;
            color: #fff;
            margin-bottom: 2px;
        }
        header h1 strong { font-weight: 700; color: var(--accent-gold); }
        header p { font-size: 0.76rem; color: var(--text-muted); font-weight: 400; }

        /* أشرطة التحكم والبحث */
        .controls-wrapper {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .search-container {
            position: relative;
            width: 100%;
        }
        
        .search-container svg {
            position: absolute;
            right: 15px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 16px; height: 16px;
            opacity: 0.7;
        }

        .search-input {
            width: 100%;
            padding: 11px 42px 11px 18px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.15);
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.88rem;
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: rgba(212, 175, 55, 0.3);
            background: rgba(0, 0, 0, 0.25);
        }

        /* تبويبات التصفية الناعمة */
        .tabs-container {
            display: flex;
            gap: 8px;
        }

        .tab-btn {
            flex: 1;
            padding: 8px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .tab-btn.active {
            background: rgba(212, 175, 55, 0.05);
            border-color: rgba(212, 175, 55, 0.25);
            color: var(--accent-gold);
        }

        /* قائمة السور الموحدة */
        .surah-list-container {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .surah-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 11px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.015);
            border-right: 2.5px solid transparent; /* تهيئة الحافة اليمنى لتأثير تفاعلي مبتكر */
            transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
            animation: fadeInRow 0.3s ease forwards;
            opacity: 0;
            transform: translateY(5px);
            cursor: pointer; /* جعل كامل إطار السورة يشير للضغط بالماوس وتفعيل التشغيل المباشر عند النقر */
        }

        @keyframes fadeInRow { to { opacity: 1; transform: translateY(0); } }
        .surah-row:last-child { border-bottom: none; }
        
        .surah-row:hover { 
            background: rgba(255, 255, 255, 0.015); 
            border-right-color: rgba(212, 175, 55, 0.15); /* إضاءة ذهبية رقيقة جداً عند المرور */
        }
        
        /* تأثير السورة النشطة المبتكر */
        .surah-row.active-row { 
            background: var(--glass-active); 
            border-right-color: var(--accent-gold); /* خط عمودي مذهب ثابت بجانب السورة الجاري تشغيلها */
        }

        .surah-info { display: flex; align-items: center; gap: 12px; }
        .surah-number { font-size: 0.78rem; font-weight: 400; color: var(--text-muted); min-width: 28px; text-align: right; }
        
        /* تقليص حجم خط أسماء السور لمظهر مدمج وأكثر رُقياً */
        .surah-name { 
            font-size: 0.88rem; /* تم خفضه بنصف درجة ليكون أكثر تناسقاً وتفادياً للضخامة */
            font-weight: 600; 
            letter-spacing: 0.1px; 
        }

        .actions { display: flex; gap: 6px; }

        /* أزرار الإجراءات بجانب السور */
        .icon-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-muted);
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
            text-decoration: none;
        }

        .icon-btn:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.03);
            border-color: var(--glass-border);
        }

        .icon-btn.fav-btn.is-fav { color: var(--accent-gold); }
        .icon-btn.playing-list-btn {
            color: var(--accent-gold);
            background: rgba(212, 175, 55, 0.08);
            border-color: rgba(212, 175, 55, 0.15);
        }
        .icon-btn svg { width: 15px; height: 15px; }

        /* مشغل صوتي عائم نحيف للغاية واحترافي بنمط السطر الموحد */
        .floating-player {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(160px);
            width: calc(100% - 32px);
            max-width: 628px;
            background: rgba(3, 20, 16, 0.95);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(212, 175, 55, 0.12);
            border-radius: 16px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.4);
            z-index: 999;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 8px 16px 8px 16px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .floating-player.active { transform: translateX(-50%) translateY(0); }

        /* تطوير شريط التقدم ليكون تفاعلياً ومناسباً للسحب */
        .player-seekbar-container {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px; /* تحسين الارتفاع الأولي */
            background: rgba(255,255,255,0.06);
            cursor: pointer;
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            transition: height 0.2s ease, top 0.2s ease;
            display: flex;
            align-items: center;
            direction: ltr; /* فرض الاتجاه من اليسار لليمين ليبدأ الشريط من الجهة المقابلة */
        }

        /* يتسع شريط السحب عند تمرير الفأرة أو لمسه */
        .player-seekbar-container:hover,
        .player-seekbar-container.dragging {
            height: 8px;
        }

        .player-seekbar-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--accent-gold), #fff);
            position: relative;
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            transition: width 0.1s linear;
            box-shadow: 0 0 6px rgba(212, 175, 55, 0.4);
        }

        /* مقبض سحب احترافي (Thumb) صغير الحجم ومستقر بشكل دائم من البداية */
        .player-seekbar-thumb {
            position: absolute;
            left: 100%; /* الارتكاز التام على نهاية خط التعبئة بدقة */
            top: 50%;
            transform: translate(-50%, -50%) scale(1); /* جعل الرأس مرئية ومفعلة دائماً من البداية */
            width: 10px; height: 10px; /* رأس دائرية صغيرة */
            background: #fff;
            border: 2px solid var(--accent-gold);
            border-radius: 50%;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            pointer-events: none;
        }

        /* تفاعل الرأس بالتمدد التلقائي قليلاً عند اللمس والسحب لزيادة سهولة التحكم */
        .player-seekbar-container:hover .player-seekbar-thumb,
        .player-seekbar-container.dragging .player-seekbar-thumb {
            transform: translate(-50%, -50%) scale(1.3);
        }

        /* الهيكل المضغوط والموحد للمشغل أحادي السطر */
        .player-compact-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-top: 6px;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 0; /* يسمح باقتصاص النص الفائض */
        }

        .player-visualizer { display: flex; align-items: flex-end; gap: 2.5px; height: 12px; width: 14px; flex-shrink: 0; }
        .player-visualizer span { width: 2px; background: var(--accent-gold); animation: bounce 0.8s infinite ease-in-out alternate; border-radius: 1px; }
        .player-visualizer.paused span { animation-play-state: paused; height: 2px !important; }
        .player-visualizer span:nth-child(1) { height: 10px; animation-delay: 0.1s; }
        .player-visualizer span:nth-child(2) { height: 5px; animation-delay: 0.3s; }
        .player-visualizer span:nth-child(3) { height: 12px; animation-delay: 0.5s; }

        @keyframes bounce { 10% { height: 2px; } 100% { height: 100%; } }

        .player-title { 
            font-size: 0.82rem; 
            font-weight: 400; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            color: var(--text-main); 
        }

        /* عرض توقيت مدمج */
        .player-time-display {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 0.74rem;
            color: var(--text-muted);
            user-select: none;
            white-space: nowrap;
        }
        
        /* تجميع الأزرار المطلوبة فقط (التشغيل وكتم الصوت) */
        .player-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .player-btn { 
            background: transparent; 
            border: none; 
            color: var(--text-muted); 
            width: 32px; height: 32px; 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.2s; 
        }
        .player-btn:hover { color: var(--text-main); }
        
        .player-btn.play-toggle-btn { 
            background: rgba(212, 175, 55, 0.1); 
            color: var(--accent-gold); 
            border: 1px solid rgba(212, 175, 55, 0.15); 
            width: 34px; height: 34px;
        }
        .player-btn.play-toggle-btn:hover { background: rgba(212, 175, 55, 0.18); }
        .player-btn svg { width: 14px; height: 14px; }
        .player-btn.play-toggle-btn svg { width: 15px; height: 15px; }

        /* سطر التحكم الإضافي الأنيق (مؤقت النوم + تكرار السور) */
        .player-sub-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-top: 6px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            padding-top: 6px;
        }

        .sub-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s;
            font-family: inherit;
            font-size: 0.72rem;
        }

        .sub-btn:hover {
            color: var(--accent-gold);
            background: rgba(255, 255, 255, 0.02);
        }

        .sub-btn svg {
            width: 12px;
            height: 12px;
            opacity: 0.8;
            stroke: currentColor;
        }

        .sub-btn.active {
            color: var(--accent-gold);
            background: rgba(212, 175, 55, 0.05);
        }

        .sleep-timer-container {
            position: relative;
        }

        /* قائمة مؤقت النوم المنبثقة للأعلى */
        .sleep-timer-menu {
            position: absolute;
            bottom: calc(100% + 8px);
            left: 0;
            background: rgba(3, 20, 16, 0.98);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            padding: 4px 0;
            display: none;
            flex-direction: column;
            min-width: 110px;
            z-index: 1000;
        }

        .sleep-timer-menu.show {
            display: flex;
        }

        .sleep-menu-item {
            padding: 6px 12px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
            text-align: right;
            font-size: 0.72rem;
        }

        .sleep-menu-item:hover {
            background: rgba(212, 175, 55, 0.06);
            color: var(--accent-gold);
        }

        .sleep-menu-item.active {
            background: rgba(212, 175, 55, 0.1);
            color: var(--accent-gold);
            font-weight: 600;
        }

        .toast-notification {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: rgba(2, 13, 10, 0.96); border: 1px solid rgba(212, 175, 55, 0.2);
            color: var(--text-main); padding: 10px 18px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4); z-index: 2000; font-size: 0.82rem;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); pointer-events: none;
            display: flex; align-items: center; gap: 8px;
        }
        .toast-notification.active { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div class="container">
        <!-- قسم العنوان المحدث بضبط مركز ومحيط الصورة الفنية وبنصوص جديدة مخصصة للختمة المفقودة -->
        <header>
            <div class="header-image-container">
                <img src="https://f.top4top.io/p_38068cvpd0.jpg" alt="الشيخ محمد صديق المنشاوي" class="header-img">
            </div>
            <h1>الشيخ محمد صديق <strong>المنشاوي</strong></h1>
            <p>الختمة المرتلة الثانية ( الختمة المفقودة )</p>
        </header>

        <div class="controls-wrapper">
            <div class="search-container">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <input type="text" id="search-input" class="search-input" placeholder="ابحث عن اسم السورة..." onkeyup="filterSurahs()">
            </div>

            <div class="tabs-container">
                <button class="tab-btn active" id="tab-all" onclick="switchTab('all')">كل السور</button>
                <button class="tab-btn" id="tab-fav" onclick="switchTab('fav')">
                    <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor" style="vertical-align: middle;"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                    المفضلة
                </button>
            </div>
        </div>

        <div class="surah-list-container" id="main-surah-list"></div>
    </div>

    <!-- المشغل العائم النحيف والاحترافي المدمج (سطر واحد مذهب) -->
    <div class="floating-player" id="global-player">
        <!-- شريط التقدم التفاعلي الداعم للسحب والمزامنة البصرية -->
        <div class="player-seekbar-container" id="progress-container">
            <div class="player-seekbar-fill" id="progress-bar-fill">
                <span class="player-seekbar-thumb"></span>
            </div>
        </div>

        <!-- السطر الموحد المدمج للمشغل -->
        <div class="player-compact-row">
            <!-- اليسار: متبذب الصوت وعنوان السورة -->
            <div class="player-info">
                <div class="player-visualizer" id="visualizer">
                    <span></span><span></span><span></span>
                </div>
                <div class="player-title" id="player-track-title">جاري تحميل قائمة السور...</div>
            </div>

            <!-- الوسط: توقيت التشغيل المدمج -->
            <div class="player-time-display">
                <span id="player-current-time">00:00</span>
                <span style="opacity: 0.5;">/</span>
                <span id="player-duration-time">00:00</span>
            </div>
            
            <!-- اليمين: زر كتم الصوت وزر التشغيل فقط -->
            <div class="player-actions">
                <!-- زر كتم الصوت فقط (تم الاستغناء عن شريط التمرير الجانبي لمظهر نظيف ونحيف) -->
                <button class="player-btn" onclick="toggleMute()" id="volume-btn" title="كتم / تشغيل الصوت">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                </button>
                
                <!-- زر تشغيل / إيقاف مؤقت -->
                <button class="player-btn play-toggle-btn" onclick="togglePlayPause()" id="player-play-btn" title="تشغيل / إيقاف">
                    <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                </button>
            </div>
        </div>

        <!-- السطر المساعد الجديد لإدارة مؤقت النوم وأوضاع التشغيل -->
        <div class="player-sub-row">
            <!-- وضع التشغيل وتكرار السورة -->
            <div class="play-mode-container">
                <button class="sub-btn" id="repeat-mode-btn" onclick="cyclePlayMode()" title="وضع التشغيل">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                    <span id="play-mode-label">التشغيل التالي تلقائياً</span>
                </button>
            </div>

            <!-- مؤقت النوم الاحترافي -->
            <div class="sleep-timer-container">
                <button class="sub-btn" id="sleep-timer-btn" onclick="toggleSleepTimerMenu(event)" title="مؤقت النوم">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    <span id="sleep-timer-label">مؤقت النوم</span>
                </button>
                <div class="sleep-timer-menu" id="sleep-timer-menu">
                    <div class="sleep-menu-item active" onclick="setSleepTimer(0)">إيقاف المؤقت</div>
                    <div class="sleep-menu-item" onclick="setSleepTimer(15)">15 دقيقة</div>
                    <div class="sleep-menu-item" onclick="setSleepTimer(30)">30 دقيقة</div>
                    <div class="sleep-menu-item" onclick="setSleepTimer(45)">45 دقيقة</div>
                    <div class="sleep-menu-item" onclick="setSleepTimer(60)">60 دقيقة</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const icons = {
            play: `<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"></polygon></svg>`,
            pause: `<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="3" height="16"></rect><rect x="15" y="4" width="3" height="16"></rect></svg>`,
            download: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>`,
            star: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`
        };

        // إدارة أيقونات وضع التشغيل المخصص
        const modeIcons = {
            all: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>`,
            one: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/><text x="10" y="14" font-size="8" font-weight="bold" fill="currentColor" stroke="none">1</text></svg>`,
            stop: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect></svg>`
        };

        const modeLabels = {
            all: 'التشغيل التالي تلقائياً',
            one: 'تكرار السورة الحالية',
            stop: 'إيقاف بعد انتهاء السورة'
        };

        let surahs = [];
        let favorites = JSON.parse(localStorage.getItem('premium_quran_favorites')) || [];
        let currentActiveTab = 'all';

        let audioInstance = new Audio();
        let playingSurahId = null;
        let lastVolume = 1;

        // متغيرات لمراقبة عملية سحب ومزامنة شريط التشغيل
        let isDraggingProgress = false;
        let isSeeking = false; // لمنع أي ارتدادات برمجية أثناء طلب الملف الصوتي
        let toastTimeout; // متغير للتحكم في بقاء الإشعارات

        // متغيرات إضافية لوضع التشغيل ومؤقت النوم
        let playMode = 'all'; // الأوضاع: 'all' (التالي تلقائياً), 'one' (تكرار السورة), 'stop' (إيقاف)
        let sleepTimerId = null;
        let sleepTimerRemaining = 0;
        let sleepTimerIntervalId = null;

        // ربط أحداث القفز الزمني الفعلي لمنع أي قفزات ارتدادية
        audioInstance.onseeking = () => { isSeeking = true; };
        audioInstance.onseeked = () => { isSeeking = false; };

        // تحديث حالة التشغيل المباشر لنظام الوسائط في الخلفية
        audioInstance.onplay = () => {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.playbackState = "playing";
            }
        };
        audioInstance.onpause = () => {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.playbackState = "paused";
            }
        };

        // جلب البيانات ديناميكياً من ملف JSON
        async function fetchSurahData() {
            try {
                // محاولة جلب ملف surahs.json من الخادم مع معطيات لمنع الكاش (Cache)
                const response = await fetch('surahs.json?t=' + Date.now());
                if (response.ok) {
                    surahs = await response.json();
                    // الاحتفاظ بنسخة محدثة محلياً كاحتياط
                    localStorage.setItem('premium_quran_data', JSON.stringify(surahs));
                } else {
                    throw new Error('تعذر العثور على surahs.json على الخادم');
                }
            } catch (err) {
                console.warn('تعذر جلب الملف من الخادم، جاري التحميل من التخزين الاحتياطي:', err);
                // محاولة التحميل من متصفحك مباشرة إذا كنت تجرب لوحة التحكم محلياً
                surahs = JSON.parse(localStorage.getItem('premium_quran_data')) || [];
            }
            document.getElementById('player-track-title').innerText = "اختر سورة للبدء...";
            renderUI();
        }

        function renderUI() {
            const mainList = document.getElementById('main-surah-list');
            mainList.innerHTML = '';
            
            surahs.sort((a, b) => a.id - b.id);

            let filteredSurahs = surahs;
            if (currentActiveTab === 'fav') {
                filteredSurahs = surahs.filter(s => favorites.includes(s.id));
            }

            if(filteredSurahs.length === 0) {
                if (currentActiveTab === 'fav') {
                    mainList.innerHTML = '<p style="text-align:center; color:var(--text-muted); padding: 30px; font-size:0.85rem; font-weight:300;">قائمتك المفضلة فارغة حالياً.</p>';
                } else {
                    const query = document.getElementById('search-input')?.value || '';
                    if (query.trim() !== '') {
                        mainList.innerHTML = '<p style="text-align:center; color:var(--text-muted); padding: 30px; font-size:0.85rem; font-weight:300;">لم يتم العثور على نتائج بحث.</p>';
                    } else {
                        mainList.innerHTML = '<p style="text-align:center; color:var(--text-muted); padding: 30px; font-size:0.85rem; font-weight:300;">لا توجد سور مضافة حالياً. تفضل بإضافة سور وتصدير الملف من لوحة الإدارة.</p>';
                    }
                }
            }

            filteredSurahs.forEach((surah, index) => {
                const delay = Math.min(index * 0.02, 1);
                const isCurrentPlaying = (playingSurahId === surah.id);
                const isFav = favorites.includes(surah.id);

                const row = document.createElement('div');
                row.className = `surah-row ${isCurrentPlaying ? 'active-row' : ''}`;
                row.style.animationDelay = `${delay}s`;
                row.setAttribute('data-id', surah.id);
                
                // تفعيل حدث التشغيل المباشر عند النقر على كامل إطار السورة
                row.onclick = () => selectAndPlay(surah.id);
                
                // تم تمرير حدث منع الانتشار (stopPropagation) للأزرار الجانبية لمنع تداخل تشغيل السورة عند الضغط عليها
                row.innerHTML = `
                    <div class="surah-info">
                        <span class="surah-number">${String(surah.id).padStart(3, '0')}</span>
                        <span class="surah-name">سورة ${surah.name}</span>
                    </div>
                    <div class="actions">
                        <button class="icon-btn fav-btn ${isFav ? 'is-fav' : ''}" onclick="toggleFav(${surah.id}, event)" title="${isFav ? 'إزالة من المفضلة' : 'إضافة للمفضلة'}">${icons.star}</button>
                        <button class="icon-btn list-play-btn ${isCurrentPlaying ? 'playing-list-btn' : ''}" onclick="event.stopPropagation(); selectAndPlay(${surah.id})" aria-label="تشغيل">
                            ${isCurrentPlaying && !audioInstance.paused ? icons.pause : icons.play}
                        </button>
                        <button class="icon-btn" onclick="event.stopPropagation(); downloadAudio('${surah.url}', 'سورة ${surah.name} - المنشاوي.mp3', this)" aria-label="تحميل مباشر" title="تحميل مباشر">${icons.download}</button>
                    </div>
                `;
                mainList.appendChild(row);
            });
        }

        function switchTab(tab) {
            currentActiveTab = tab;
            document.getElementById('tab-all').classList.toggle('active', tab === 'all');
            document.getElementById('tab-fav').classList.toggle('active', tab === 'fav');
            renderUI();
        }

        function toggleFav(id, event) {
            if (event) event.stopPropagation(); 
            if (favorites.includes(id)) {
                favorites = favorites.filter(favId => favId !== id);
            } else {
                favorites.push(id);
            }
            localStorage.setItem('premium_quran_favorites', JSON.stringify(favorites));
            renderUI();
        }

        // دالة التحميل المباشر والاحترافية: تدعم التنزيل الفوري مع عداد النسبة المئوية المباشر
        // وتتجنب تماماً التوجيه لصفحات المشغلات الافتراضية
        async function downloadAudio(url, filename, buttonElement) {
            if (buttonElement) {
                buttonElement.style.pointerEvents = 'none';
                buttonElement.style.opacity = '0.4';
            }
            
            // تفعيل الإشعار والبدء المباشر للتحميل
            showToast('جاري الاتصال بالخادم وتجهيز التحميل...', 0);

            // إرسال حدث التحميل يدوياً إلى Google Analytics لضمان احتسابه بدقة
            if (typeof gtag === 'function') {
                gtag('event', 'file_download', {
                    'file_name': filename,
                    'file_extension': 'mp3',
                    'link_url': url
                });
            }

            try {
                // جلب دفق البيانات (Stream Fetch)
                const response = await fetch(url);
                if (!response.ok) throw new Error('فشل جلب الملف من الخادم');

                const contentLength = response.headers.get('content-length');
                const totalBytes = contentLength ? parseInt(contentLength, 10) : 0;
                
                const reader = response.body.getReader();
                let receivedBytes = 0;
                let chunks = [];

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    chunks.push(value);
                    receivedBytes += value.length;
                    
                    if (totalBytes > 0) {
                        const percent = Math.round((receivedBytes / totalBytes) * 100);
                        showToast(`جاري التحميل المباشر: ${percent}% ... يرجى الانتظار`, 0);
                    } else {
                        const receivedMB = (receivedBytes / (1024 * 1024)).toFixed(1);
                        showToast(`جاري تحميل السورة: ${receivedMB} MB ... يرجى الانتظار`, 0);
                    }
                }

                // دمج الأجزاء المستلمة لملف كامل
                const blob = new Blob(chunks, { type: 'audio/mpeg' });
                const blobUrl = window.URL.createObjectURL(blob);
                
                // بدء تشغيل التحميل التلقائي الفوري دون مغادرة الصفحة
                const tempLink = document.createElement('a');
                tempLink.href = blobUrl;
                tempLink.download = filename;
                document.body.appendChild(tempLink);
                tempLink.click();
                
                // تنظيف الملفات المؤقتة من المتصفح
                document.body.removeChild(tempLink);
                window.URL.revokeObjectURL(blobUrl);
                
                showToast('اكتمل تنزيل الملف بنجاح! 🎉', 3000, true);
                
            } catch (error) {
                console.warn('تم استخدام التحويل الاحتياطي بسبب قيود النطاق الخارجي CORS:', error);
                // الحل الاحتياطي السريع في حال فشل الجلب البرمجي
                window.open(url, '_blank');
                alert('تم الانتقال لصفحة المشغل نظراً لقيود حماية الخادم الخارجية.\n\nتنبيه: اضغط على خيارات المشغل الجديد (الثلاث نقاط) ثم اختر "تنزيل" لحفظ الملف على جهازك.');
                
                // إخفاء إشعار التحميل
                let toast = document.getElementById('app-toast');
                if (toast) toast.classList.remove('active');
            } finally {
                if (buttonElement) {
                    buttonElement.style.pointerEvents = 'auto';
                    buttonElement.style.opacity = '1';
                }
            }
        }

        function showToast(message, duration = 3000, isSuccess = false) {
            let toast = document.getElementById('app-toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'app-toast';
                toast.className = 'toast-notification';
                document.body.appendChild(toast);
            }
            
            // إلغاء أي وقت مؤجل للإخفاء لمنع تعارض الإشعارات المتتابعة أثناء التحميل
            clearTimeout(toastTimeout);
            
            toast.style.borderColor = isSuccess ? 'var(--success)' : 'rgba(212, 175, 55, 0.25)';
            toast.innerText = message;
            toast.classList.add('active');
            
            if (duration > 0) {
                toastTimeout = setTimeout(() => { toast.classList.remove('active'); }, duration);
            }
        }

        // تحسين آلية التشغيل والانتقال الفوري لمنع تأخر استجابة المتصفح وحل التعليق
        function selectAndPlay(id) {
            const selectedSurah = surahs.find(s => s.id === id);
            if (!selectedSurah) return;

            if (playingSurahId === id) {
                togglePlayPause();
                return;
            }

            // إيقاف التشغيل الحالي فوراً لمنع تداخل الأصوات والتعليق البرمجي
            audioInstance.pause();

            playingSurahId = id;
            
            // تفعيل المشغل وتصفير المؤشرات البصرية فوراً لاستجابة لحظية ملموسة
            document.getElementById('global-player').classList.add('active');
            document.getElementById('player-track-title').innerText = `سورة ${selectedSurah.name}`;
            document.getElementById('progress-bar-fill').style.width = '0%';
            document.getElementById('player-current-time').innerText = '00:00';
            document.getElementById('player-duration-time').innerText = '00:00';

            // إسناد رابط السورة الجديد مباشرة (المتصفح يتولى تحميل وتدفق الملف تلقائياً في الخلفية)
            audioInstance.src = selectedSurah.url;

            // تحديث مركز وسائط الهاتف والسيارة لعرض معلومات السورة الجارية
            updateMediaSession(selectedSurah);
            
            const playPromise = audioInstance.play();
            if (playPromise !== undefined) {
                playPromise.then(() => { 
                    updatePlayerUI(true); 
                }).catch(err => { 
                    console.warn("تنبيه: تم إلغاء طلب التشغيل بسبب التنقل السريع، أو لم يكتمل تحميل الملف:", err); 
                });
            }
        }

        // إيقاف مؤقت / تشغيل
        function togglePlayPause() {
            if (!playingSurahId && surahs.length > 0) {
                selectAndPlay(surahs[0].id);
                return;
            }
            if (audioInstance.paused) {
                audioInstance.play();
                updatePlayerUI(true);
            } else {
                audioInstance.pause();
                updatePlayerUI(false);
            }
        }

        function playNext() {
            if (!playingSurahId || surahs.length === 0) return;
            const currentIndex = surahs.findIndex(s => s.id === playingSurahId);
            if (currentIndex !== -1 && currentIndex < surahs.length - 1) {
                selectAndPlay(surahs[currentIndex + 1].id);
            } else {
                selectAndPlay(surahs[0].id);
            }
        }

        // تشغيل السورة السابقة (مفيد لدعم أزرار بلوتوث السيارة والهاتف)
        function playPrevious() {
            if (!playingSurahId || surahs.length === 0) return;
            const currentIndex = surahs.findIndex(s => s.id === playingSurahId);
            if (currentIndex !== -1 && currentIndex > 0) {
                selectAndPlay(surahs[currentIndex - 1].id);
            } else {
                selectAndPlay(surahs[surahs.length - 1].id); // العودة لآخر سورة
            }
        }

        function toggleMute() {
            if (audioInstance.volume > 0) {
                lastVolume = audioInstance.volume;
                setVolume(0);
            } else {
                setVolume(lastVolume);
            }
        }

        function setVolume(val) {
            audioInstance.volume = val;
            const volBtn = document.getElementById('volume-btn');
            if (val == 0) {
                volBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>`;
            } else {
                volBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>`;
            }
        }

        function updatePlayerUI(isPlaying) {
            const playBtn = document.getElementById('player-play-btn');
            const visualizer = document.getElementById('visualizer');
            if (isPlaying) {
                playBtn.innerHTML = icons.pause;
                visualizer.classList.remove('paused');
            } else {
                playBtn.innerHTML = icons.play;
                visualizer.classList.add('paused');
            }
            renderUI();
        }

        // ربط وتحديث شريط التقدم الفني مع تفادي التحديث التلقائي أثناء قيام المستخدم بالسحب الفعلي أو أثناء عملية البحث الزمني (Seeking)
        audioInstance.ontimeupdate = () => {
            if (isNaN(audioInstance.duration) || isDraggingProgress || isSeeking) return;
            const progress = (audioInstance.currentTime / audioInstance.duration) * 100;
            document.getElementById('progress-bar-fill').style.width = `${progress}%`;
            document.getElementById('player-current-time').innerText = formatTime(audioInstance.currentTime);
        };

        audioInstance.onloadedmetadata = () => {
            document.getElementById('player-duration-time').innerText = formatTime(audioInstance.duration);
        };

        // الانتقال التلقائي حسب وضع التشغيل المحدد (تكرار، توالي، إيقاف)
        audioInstance.onended = () => {
            if (playMode === 'all') {
                playNext();
            } else if (playMode === 'one') {
                audioInstance.currentTime = 0;
                audioInstance.play().then(() => updatePlayerUI(true)).catch(err => console.warn(err));
            } else if (playMode === 'stop') {
                updatePlayerUI(false);
            }
        };

        // التنقل الدائري والذكي بين أوضاع التشغيل الثلاثة
        function cyclePlayMode() {
            if (playMode === 'all') {
                playMode = 'one';
            } else if (playMode === 'one') {
                playMode = 'stop';
            } else {
                playMode = 'all';
            }
            
            const btn = document.getElementById('repeat-mode-btn');
            btn.innerHTML = `${modeIcons[playMode]} <span id="play-mode-label">${modeLabels[playMode]}</span>`;
            
            if (playMode !== 'all') {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
            
            showToast(`وضع التشغيل: ${modeLabels[playMode]}`, 2000);
        }

        // فتح وإغلاق قائمة مؤقت النوم المنبثقة
        function toggleSleepTimerMenu(event) {
            if (event) event.stopPropagation();
            const menu = document.getElementById('sleep-timer-menu');
            menu.classList.toggle('show');
        }

        // إغلاق القائمة فور الضغط خارج نطاق زر مؤقت النوم
        window.addEventListener('click', (e) => {
            const container = document.querySelector('.sleep-timer-container');
            const menu = document.getElementById('sleep-timer-menu');
            if (container && !container.contains(e.target)) {
                menu.classList.remove('show');
            }
        });

        // ضبط وتفعيل مؤقت النوم وبدء العد التنازلي التفاعلي
        function setSleepTimer(minutes) {
            if (sleepTimerId) clearTimeout(sleepTimerId);
            if (sleepTimerIntervalId) clearInterval(sleepTimerIntervalId);
            
            const btn = document.getElementById('sleep-timer-btn');
            const label = document.getElementById('sleep-timer-label');
            
            // تنظيف التفعيل السابق في عناصر القائمة
            document.querySelectorAll('.sleep-menu-item').forEach(el => el.classList.remove('active'));

            if (minutes === 0) {
                sleepTimerRemaining = 0;
                label.innerText = 'مؤقت النوم';
                btn.classList.remove('active');
                document.querySelectorAll('.sleep-menu-item')[0].classList.add('active');
                document.getElementById('sleep-timer-menu').classList.remove('show');
                return;
            }

            // إعطاء مظهر النشاط للعنصر المختار
            const itemIdx = [15, 30, 45, 60].indexOf(minutes) + 1;
            const items = document.querySelectorAll('.sleep-menu-item');
            if (items[itemIdx]) items[itemIdx].classList.add('active');

            sleepTimerRemaining = minutes * 60;
            btn.classList.add('active');
            document.getElementById('sleep-timer-menu').classList.remove('show');

            updateSleepTimerUI();

            // تحديث العداد التنازلي كل ثانية
            sleepTimerIntervalId = setInterval(() => {
                sleepTimerRemaining--;
                if (sleepTimerRemaining <= 0) {
                    clearInterval(sleepTimerIntervalId);
                    clearTimeout(sleepTimerId);
                    // إيقاف تشغيل المشغل
                    audioInstance.pause();
                    updatePlayerUI(false);
                    // إعادة تعيين واجهة زر مؤقت النوم
                    label.innerText = 'مؤقت النوم';
                    btn.classList.remove('active');
                    showToast('تم إيقاف التشغيل بواسطة مؤقت النوم 💤', 3000, true);
                } else {
                    updateSleepTimerUI();
                }
            }, 1000);
        }

        function updateSleepTimerUI() {
            const label = document.getElementById('sleep-timer-label');
            const mins = Math.floor(sleepTimerRemaining / 60);
            const secs = sleepTimerRemaining % 60;
            label.innerText = `مؤقت النوم (${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')})`;
        }

        // تكامل وعرض معلومات السورة والتحكم من شاشات قفل الهاتف وبلوتوث السيارات
        function updateMediaSession(surah) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: `سورة ${surah.name}`,
                    artist: 'الشيخ محمد صديق المنشاوي',
                    album: 'الختمة المرتلة الثانية (الختمة المفقودة)',
                    artwork: [
                        { src: 'https://f.top4top.io/p_38068cvpd0.jpg', sizes: '512x512', type: 'image/jpeg' }
                    ]
                });

                // تعيين وتفعيل وظائف الأزرار الخارجية
                navigator.mediaSession.setActionHandler('play', () => {
                    togglePlayPause();
                });
                navigator.mediaSession.setActionHandler('pause', () => {
                    togglePlayPause();
                });
                navigator.mediaSession.setActionHandler('previoustrack', () => {
                    playPrevious();
                });
                navigator.mediaSession.setActionHandler('nexttrack', () => {
                    playNext();
                });
            }
        }

        // تطوير معالج السحب والتقديم المتزامن والاحترافي لشريط التشغيل لمنع أي ارتداد زمني
        function initProgressDrag() {
            const container = document.getElementById('progress-container');
            const fill = document.getElementById('progress-bar-fill');
            const timeLabel = document.getElementById('player-current-time');
            let lastPct = 0; // الاحتفاظ بآخر قيمة صحيحة ومؤكدة للنسبة المئوية

            function getPercentage(e) {
                const rect = container.getBoundingClientRect();
                let clientX;
                
                if (e.touches && e.touches.length > 0) {
                    clientX = e.touches[0].clientX;
                } else if (e.changedTouches && e.changedTouches.length > 0) {
                    // لمس الشاشات الذكية عند الإفلات يستعين بـ changedTouches
                    clientX = e.changedTouches[0].clientX;
                } else {
                    clientX = e.clientX;
                }

                if (clientX === undefined) {
                    return lastPct;
                }

                let pct = (clientX - rect.left) / rect.width;
                pct = Math.max(0, Math.min(1, pct));
                lastPct = pct; // تحديث النسبة الاحتياطية المضمونة
                return pct;
            }

            function onDragStart(e) {
                isDraggingProgress = true;
                container.classList.add('dragging');
                onDrag(e);
            }

            function onDrag(e) {
                if (!isDraggingProgress) return;
                const pct = getPercentage(e);
                fill.style.width = `${pct * 100}%`;
                if (!isNaN(audioInstance.duration)) {
                    timeLabel.innerText = formatTime(pct * audioInstance.duration);
                }
            }

            function onDragEnd(e) {
                if (!isDraggingProgress) return;
                isDraggingProgress = false;
                container.classList.remove('dragging');
                const pct = getPercentage(e);
                if (!isNaN(audioInstance.duration)) {
                    // تعيين موضع التشغيل الفعلي بدقة فور الإفلات دون أي ارتداد زمني
                    audioInstance.currentTime = pct * audioInstance.duration;
                }
            }

            // الفأرة (Mouse)
            container.addEventListener('mousedown', onDragStart);
            window.addEventListener('mousemove', onDrag);
            window.addEventListener('mouseup', onDragEnd);

            // اللمس (Touch) للأجهزة المحمولة (تغطي الشاشة بالكامل لثبات السحب التام)
            container.addEventListener('touchstart', onDragStart);
            window.addEventListener('touchmove', onDrag);
            window.addEventListener('touchend', onDragEnd);
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function normalizeArabic(text) {
            if (!text) return '';
            return text
                .replace(/[ًٌٍَُِِّْ]/g, '') 
                .replace(/[أإآا]/g, 'ا')    
                .replace(/ة/g, 'ه')         
                .trim();
        }

        function filterSurahs() {
            const query = normalizeArabic(document.getElementById('search-input').value);
            const rows = document.querySelectorAll('.surah-row');
            rows.forEach(row => {
                const nameText = normalizeArabic(row.querySelector('.surah-name').innerText);
                row.style.display = nameText.includes(query) ? 'flex' : 'none';
            });
        }

        // بدء تحميل البيانات وربط معالجات الأحداث فور التحميل المبدئي
        fetchSurahData();
        initProgressDrag();
    </script>
</body>
